name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v2
      with:
        submodules: recursive
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y lcov
    
    - name: Configure CMake
      run: cmake -B _build -DBUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Debug
    
    - name: Build
      run: cmake --build _build
    
    - name: Test
      run: ./_build/check
    
    - name: Generate coverage
      run: |
        cd _build
        # Используем флаги для игнорирования ошибок
        lcov --capture --directory . --output-file coverage.info --ignore-errors mismatch --rc lcov_branch_coverage=0
        lcov --remove coverage.info '/usr/*' '*/third-party/*' '*/tests/*' --output-file coverage.info --ignore-errors unused
        lcov --list coverage.info
    
    - name: Upload to Coveralls
      uses: coverallsapp/github-action@v1.1.2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        path-to-lcov: _build/coverage.info
        flag-name: ubuntu-latest
        parallel: true

  coveralls_finish:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Coveralls Finished
      uses: coverallsapp/github-action@v1.1.2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        parallel-finished: true
