name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            compiler: g++
            compiler_c: gcc
            name: Linux (gcc)
            build_dir: build
            exe_suffix: ""
          
          - os: ubuntu-latest
            compiler: clang++
            compiler_c: clang
            name: Linux (clang)
            build_dir: build
            exe_suffix: ""
            install_cmd: sudo apt-get update && sudo apt-get install -y clang
          
          - os: windows-latest
            compiler: cl.exe
            name: Windows (MSVC)
            build_dir: build/Release
            exe_suffix: .exe

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install compiler dependencies
        if: matrix.install_cmd != ''
        run: ${{ matrix.install_cmd }}
      
      - name: Configure CMake
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            cmake -B build
          else
            cmake -B build -DCMAKE_CXX_COMPILER=${{ matrix.compiler }}
          fi
        shell: bash
      
      - name: Build
        run: cmake --build build ${{ runner.os == 'Windows' && '--config Release' || '' }}
      
      - name: Run hello_world
        run: ./${{ matrix.build_dir }}/hello_world${{ matrix.exe_suffix }}
      
      - name: Run solver
        run: ./${{ matrix.build_dir }}/solver${{ matrix.exe_suffix }}
